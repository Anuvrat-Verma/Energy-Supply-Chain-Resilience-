syntax = "proto3";

package energy_resilience;

service EnergyOrchestrator {
  // Original: For continuous backend/n8n ingestion feeds
  rpc StreamResiliencePipeline(stream AlertSignal) returns (stream SimulationResult);
  
  // NEW: For React UI manual clicks (Unary Request -> Response)
  rpc TriggerManualOverride(AlertSignal) returns (SimulationResult);
}

message AlertSignal {
  string source_headline = 1;
  string detected_chokepoint = 2;
  int32 baseline_risk_score = 3;
}

message SimulationResult {
  string active_recommendation = 1;
  double calculated_spr_days_left = 2;
  string affected_corridor = 3;
  bool trigger_alarm_ui = 4;
}